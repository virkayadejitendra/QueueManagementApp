openapi: 3.1.0
info:
  title: Queue Management API
  version: 0.1.0
  description: API-first contract for the Queue Management App MVP.
servers:
  - url: http://localhost:5000
    description: Local development
paths:
  /api/health:
    get:
      summary: Check API health
      operationId: getHealth
      tags:
        - Health
      responses:
        '200':
          description: API is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: Healthy
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: Healthy
